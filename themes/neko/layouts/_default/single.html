{{ define "main" }}
<article style="max-width: 800px; margin: 100px auto; padding: 0 20px;">
    <h1 style="font-size: 2.5rem; margin-bottom: 20px; color: #FF6B9D;">{{ .Title }}</h1>
    <div style="color: #B8B8B8; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(155,89,182,0.3);">
        {{ .Date.Format "2006/01/02" }}
    </div>
    <div style="font-size: 1.1rem; line-height: 1.9;">
        {{ .Content }}
    </div>
</article>
{{ end }}
