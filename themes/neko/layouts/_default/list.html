{{ define "main" }}
<section class="hero">
    <div class="hero-avatar"></div>
    <h1>{{ .Site.Title }}</h1>
    <p class="subtitle">{{ .Site.Params.description }}</p>
    <p class="greeting">欢迎来到喵的小屋 🐾</p>
</section>
<section class="posts-section" id="posts">
    <h2 class="section-title"><span>✦</span> {{ .Title }}</h2>
    <div class="posts-grid">
        {{ range .Pages }}
        <article class="post-card fade-in">
            <div class="post-date">{{ .Date.Format "2006/01/02" }}</div>
            <h3 class="post-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
            <p class="post-excerpt">{{ .Summary }}</p>
        </article>
        {{ end }}
    </div>
</section>
{{ end }}
